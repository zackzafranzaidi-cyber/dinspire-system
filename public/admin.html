<!doctype html>
<html lang="ms">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>CMS - Dinspire</title>
    <link rel="stylesheet" href="css/admin.css?v=18" />
    <link rel="stylesheet" href="css/loader.css?v=2" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Leaflet for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ffffff">
</head>
  <body>
    <!-- Area Loading -->
    <div class="loading-wrapper" id="preloader">
        <div class="clipper-container">
            <svg class="perfect-clipper" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <line x1="38" y1="22" x2="41" y2="24" class="hair hair-1" />
                <line x1="60" y1="21" x2="58" y2="25" class="hair hair-2" />
                <line x1="50" y1="20" x2="51" y2="23" class="hair hair-3" />
                <g stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round">
                    <path d="M 40,80 Q 40,50 46,35 L 54,35 Q 60,50 60,80 Q 50,86 40,80 Z" />
                    <rect x="47" y="52" width="6" height="8" rx="2" fill="currentColor" />
                    <line x1="48" y1="54.5" x2="52" y2="54.5" stroke="#0b0c10" stroke-width="1" />
                    <line x1="48" y1="57.5" x2="52" y2="57.5" stroke="#0b0c10" stroke-width="1" />
                    <path d="M 47,84 Q 47,91 50,91 Q 53,91 53,84" />
                    <rect x="46" y="28" width="8" height="7" fill="currentColor" />
                    <path d="M 32,28 L 68,28 L 68,25 Q 68,22 55,22 L 45,22 Q 32,22 32,25 Z" />
                    <line x1="33" y1="21.5" x2="67" y2="21.5" stroke-width="1.5" stroke-dasharray="1.5, 1.5" />
                </g>
                <rect x="36" y="18.5" width="28" height="3" rx="1.5" fill="currentColor" class="vibrating-blade" />
            </svg>
        </div>
        <div class="loading-text">TRIMMING</div>
    </div>
    <div id="login-overlay">
      <div class="login-box">
        <h2>Akses Pentadbir</h2>
        <p>Sila masukkan butiran untuk mengurus data</p>

        <input
          type="text"
          id="sys-username"
          placeholder="Nama Pengguna (Username)"
        />
        <input type="password" id="sys-password" placeholder="Kata Laluan" />

        <button onclick="loginAdmin(['admin', 'owner'])">Log Masuk CMS</button>
      </div>
    </div>

    <div class="sidebar">
      <div class="sidebar-header">CMS Panel</div>
      <div class="nav-list">
        <div class="nav-item active" onclick="switchTab('Haircuts', this)">
          Guntingan
        </div>
        <div class="nav-item" onclick="switchTab('Treatments', this)">
          Rawatan
        </div>
        <div class="nav-item" onclick="switchTab('Branches', this)">
          Cawangan
        </div>
        <div class="nav-item" onclick="switchTab('Barbers', this)">
          Barbers (Staff)
        </div>
        <div class="nav-item" onclick="switchTab('GeneralStaff', this)">
          General Staff
        </div>
        <div class="nav-item" onclick="switchTab('OnCall', this)">
          Servis OnCall
        </div>
        <div class="nav-item" onclick="switchTab('OnCallBarbers', this)">
          Barbers OnCall
        </div>
        <div class="nav-item" onclick="switchTab('WalkInServices', this)">
          Harga Walk-In
        </div>
        <div class="nav-item" onclick="switchTab('Products', this)">Produk</div>
        <div class="nav-item" onclick="switchTab('Posters', this)">
          Promosi (Poster)
        </div>
        <div
          class="nav-item"
          onclick="switchTab('Settings', this)"
          style="
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 10px;
            padding-top: 15px;
            color: #1877f2;
            font-weight: bold;
          "
        >
          <i class="fas fa-cog" style="margin-right: 8px"></i> Tetapan Sistem &
          Caj
        </div>
        <div
          class="nav-item"
          onclick="switchTab('ResetRequests', this)"
          style="
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 5px;
            padding-top: 12px;
            color: #E65100;
            font-weight: bold;
          "
        >
          <i class="fas fa-key" style="margin-right: 8px"></i> Permohonan Reset
        </div>
      </div>
    </div>

    <div class="main-content">
      <div class="topbar">
        <h2 id="current-section-title">Pengurusan Guntingan</h2>
        <button class="save-btn" id="main-save-btn" onclick="saveAllData()">
          <i class="fas fa-cloud-upload-alt" style="margin-right: 8px"></i>
          Simpan ke Cloud
        </button>
      </div>
      <div class="content-area" id="dynamic-content">
        <div style="text-align: center; margin-top: 50px; color: #888">
          Memuat turun data...
        </div>
      </div>
    </div>

    <!-- [DIBAIKI] Masukkan Library SweetAlert2 dari CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/admin.js?v=18"></script>
      <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js?v=3");
            });
        }
    </script>
</body>
</html>
